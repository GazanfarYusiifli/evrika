<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="format-detection" content="telephone=no">
  <title>Evrika CRM Dashboard</title>
    <meta name="description" content="Evrika – gələcəyin liderlərini yetişdirən müasir təhsil ekosistemi.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #e11d48;
      --accent-hover: #be123c;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 280px; background-color: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sb-header { padding: 30px; border-bottom: 1px solid var(--border); }
    .sb-header h2 { font-weight: 800; font-size: 1.5rem; letter-spacing: 1px; color: white; display: flex; align-items: center; gap: 10px; }
    .sb-nav { padding: 20px 0; flex: 1; display: flex; flex-direction: column; }
    .sb-link { padding: 15px 30px; display: flex; align-items: center; gap: 15px; color: var(--text-muted); text-decoration: none; font-weight: 500; transition: 0.3s; }
    .sb-link:hover, .sb-link.active { color: white; background: rgba(255,255,255,0.05); border-left: 4px solid var(--accent); }
    
    /* Main Content */
    .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
    .topbar { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 40px; justify-content: space-between; background: var(--bg); position: sticky; top: 0; z-index: 10; }
    .topbar h1 { font-size: 1.25rem; font-weight: 600; }
    
    /* Content Area */
    .content { padding: 40px; }
    
    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--panel); padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
    .stat-title { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 2.5rem; font-weight: 800; }
    
    /* Table */
    .table-wrapper { background: var(--panel); border-radius: 12px; border: 1px solid var(--border); overflow: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px 24px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { background: rgba(0,0,0,0.2); font-weight: 600; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    
    .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .badge.new { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .btn-view { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
    .btn-view:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s; margin-left: 10px; }
    
    .empty-state { padding: 60px; text-align: center; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal { background: var(--panel); width: 100%; max-width: 900px; max-height: 90vh; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; transform: translateY(20px); transition: 0.3s; }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 1.25rem; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
    .modal-close:hover { color: white; }
    .modal-body { padding: 24px; overflow-y: auto; display: grid; gap: 20px; }
    
    .data-group { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
    .data-group h4 { margin-bottom: 15px; color: var(--accent); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .data-item { display: flex; flex-direction: column; gap: 5px; }
    .data-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .data-value { font-weight: 500; font-size: 0.95rem; word-break: break-all; }
  
@media (max-width: 1024px) {
  .nav-glass-container {
    display: flex !important;
    background: #ffffff !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    border: none !important;
    box-shadow: none !important;
    align-items: center !important;
    flex-direction: row !important;
    width: 100% !important;
    box-sizing: border-box !important;
    padding: 8px 15px !important;
    margin: 0 !important;
    border-radius: 0 !important;
  }

  .modern-floating-nav.scrolled .nav-glass-container {
    padding: 8px 15px !important;
    border-radius: 0 !important;
  }

  .nav-glass-container .logo {
    flex-shrink: 0 !important;
  }

  .nav-links {
    display: none !important;
  }

  .nav-actions,
  .modern-floating-nav.scrolled .nav-actions,
  .modern-floating-nav.nav-hidden .nav-actions {
    display: flex !important;
    align-items: center !important;
    margin-left: auto !important;
    margin-right: 0 !important;
    flex-shrink: 0 !important;
  }
  
  .nav-actions > a:not(.nav-btn) {
    display: none !important;
  }
  
  .nav-actions > a.nav-btn {
    padding: 8px 16px !important;
    font-size: 0.82rem !important;
    margin: 0 !important;
    border-radius: 10px !important;
    white-space: nowrap !important;
  }
  
  .nav-actions > a.nav-btn:hover {
    transform: none !important;
  }

  .mobile-menu-btn,
  .modern-floating-nav.scrolled .mobile-menu-btn,
  .modern-floating-nav.nav-hidden .mobile-menu-btn {
    margin-left: 8px !important;
    margin-right: 10px !important;
    flex-shrink: 0 !important;
    position: relative !important;
    right: auto !important;
    top: auto !important;
    transform: none !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    width: 38px !important; height: 38px !important;
    background: #f8f9fa !important; border: 1px solid rgba(0,0,0,0.1) !important; color: #070d1f !important; border-radius: 10px !important; box-shadow: 0 2px 8px rgba(0,0,0,0.05) !important;
  }

  .modern-floating-nav {
    position: fixed !important;
    background: #ffffff !important;
    top: 0 !important;
    width: 100% !important;
    left: 0 !important;
    right: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03) !important;
    pointer-events: auto !important;
  }

  .modern-floating-nav.nav-hidden {
    transform: translateY(-100%) !important;
  }

  .modern-floating-nav.scrolled {
    transform: translateY(0) !important;
    top: 0 !important;
  }
}

</style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-header">
      <h2><i class="fas fa-shield-alt" style="color: var(--accent);"></i> CRM Panel</h2>
    </div>
    <nav class="sb-nav">
      <a href="#" class="sb-link active"><i class="fas fa-inbox"></i> Müraciətlər</a>
      <a href="index.html" class="sb-link" style="margin-top: auto;"><i class="fas fa-external-link-alt"></i> Sayta Qayıt</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <header class="topbar">
      <h1>Müraciətlər İdarəetməsi</h1>
      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 0.9rem; color: var(--text-muted);"><i class="fas fa-circle" style="color: #10b981; font-size: 0.6rem; margin-right: 5px;"></i> Sistem Aktivdir</span>
      </div>
    </header>
    
    <div class="content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-title">Ümumi Müraciət</div>
          <div class="stat-value" id="total-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-title">Bugünkü Müraciətlər</div>
          <div class="stat-value" id="today-count">0</div>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="crm-table">
          <thead>
            <tr>
              <th>Şagird Adı</th>
              <th>Valideyn (Ata) Nömrəsi</th>
              <th>Bağça / Məktəb Növü</th>
              <th>Tarix</th>
              <th>Status</th>
              <th>Əməliyyat</th>
            </tr>
          </thead>
          <tbody id="crm-tbody">
            <!-- Data populated here -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Müraciət Detalları</h3>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modal-content">
        <!-- Rendered via JS -->
      </div>
    </div>
  </div>

  <script>
    // --- BASIC ADMIN AUTH LOCK ---
    // Qeyd: Bu sadəcə interfeys səviyyəsində qorunmadır. Real layihədə backend token verification istifadə olunmalıdır.
    if(sessionStorage.getItem('evrika_admin') !== 'true') {
        const pass = prompt('CRM Panelinə giriş yalnız Adminlər üçündür.\nZəhmət olmasa şifrəni daxil edin:\n(Test üçün şifrə: 12345)');
        if(pass === '12345') {
            sessionStorage.setItem('evrika_admin', 'true');
        } else {
            alert('Yanlış şifrə!');
            window.location.href = 'index.html'; // Ana səhifəyə qaytar
        }
    }

    let rawData = [];

    async function loadData() {
      // 1-ci dərəcə: Həmişə əvvəlcə LocalStorage-dən (yüklədiyimiz bazadan) çəksin ki, RLS (Təhlükəsizlik) problemi varsa da, məlumat itməsin.
      const dataStr = localStorage.getItem('evrika_crm_data');
      if(dataStr) {
        rawData = JSON.parse(dataStr);
      }
      
      // 2-ci dərəcə: Supabase-dən çəkib üzərinə əlavə etməyə (və ya yeniləməyə) cəhd edir
      try {
          const res = await fetch('https://miwvdhwrmxoetszkxlzy.supabase.co/rest/v1/registrations?select=*&order=id.desc', {
              headers: {
                  'apikey': 'sb_publishable_2ze6sA6QRtBJos9jGIuKpA_08oDul8x',
                  'Authorization': 'Bearer sb_publishable_2ze6sA6QRtBJos9jGIuKpA_08oDul8x'
              }
          });
          
          if(res.ok) {
              const data = await res.json();
              if(data && data.length > 0) {
                  const supabaseData = data.map(row => {
                      const cleaned = row.payload || {};
                      cleaned._db_id_ = row.id; 
                      return cleaned;
                  });
                  // Destruktiv yazılmanı sildim. Yəni Supabase-dən gələn məlumatlarla Locally var olanlar birləşdirilir, üst-üstə yazmır!
                  // Yalnız Supabase-də olub Local-da olmayanları əlavə edirik (ID yoxlayırıq).
                  supabaseData.forEach(sbItem => {
                      const exists = rawData.some(localItem => localItem.submissionDate === sbItem.submissionDate);
                      if(!exists) rawData.push(sbItem);
                  });
                  // Tarixə görə yenidən düzürük
                  rawData.sort((a,b) => new Date(b.submissionDate) - new Date(a.submissionDate));
                  localStorage.setItem('evrika_crm_data', JSON.stringify(rawData));
              }
          }
      } catch (e) {
          console.error("API xətası:", e);
      }
      
      renderDashboard();
    }

    function renderDashboard() {
      document.getElementById('total-count').innerText = rawData.length;
      
      const todayStr = new Date().toISOString().split('T')[0];
      const todayCount = rawData.filter(item => item.submissionDate && item.submissionDate.startsWith(todayStr)).length;
      document.getElementById('today-count').innerText = todayCount;

      const tbody = document.getElementById('crm-tbody');
      tbody.innerHTML = '';

      if(rawData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-folder-open"></i><p>Hələ heç bir müraciət daxil olmayıb.</p></div></td></tr>`;
        return;
      }

      rawData.forEach((item, index) => {
        let sdName = item['[2.Şagird] Adı'];
        let demoName = item['[Demo Qeydiyyat] Ad Soyad'];
        const studentName = (sdName ? sdName + ' ' + (item['[2.Şagird] Soyadı']||'') : (demoName || 'Naməlum'));
        
        const parentPhone = item['[1.Əlaqə] Əlaqə Nömrəsi'] || item['[3.Ata] Nömrəsi'] || item['[Demo Qeydiyyat] Telefon Nömrəsi'] || '-';
        const section = item['[2.Şagird] Təhsil Növü'] || item['[2.Şagird] Müraciət Bölməsi'] || (item['[Demo Qeydiyyat] Email'] ? 'Demo Müraciət' : '-');
        
        const dateObj = new Date(item.submissionDate || Date.now());
        const dateStr = dateObj.toLocaleDateString('az-AZ') + ' ' + dateObj.toLocaleTimeString('az-AZ', {hour: '2-digit', minute:'2-digit'});

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight: 600;">${studentName}</td>
          <td>${parentPhone}</td>
          <td><span style="opacity:0.8;">${section}</span></td>
          <td style="color: var(--text-muted); font-size:0.9rem;">${dateStr}</td>
          <td><span class="badge new">${item.status || 'Yeni'}</span></td>
          <td>
            <button class="btn-view" onclick="viewDetails(${index})"><i class="fas fa-eye"></i> Bax</button>
            <button class="btn-danger" onclick="deleteItem(${index})"><i class="fas fa-trash"></i></button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.viewDetails = function(index) {
      const item = rawData[index];
      const content = document.getElementById('modal-content');
      content.innerHTML = '';

      // Categorize fields broadly based on keys
      const groups = {
        'Şagird Məlumatları': {},
        'Ata / Qəyyum Məlumatları': {},
        'Ana Məlumatları': {},
        'Digər / Əlavə': {}
      };

      for(let key in item) {
        if(['submissionDate', 'status', '_captcha', '_subject', '_template', '_db_id_'].includes(key)) {
          continue; // skip technical stuff
        }
        
        let label = key.replace(/\[.*?\]\s*/, ''); // Remove the prefixes
        let val = item[key] || '-';

        if(key.includes('[2.Şagird]')) groups['Şagird Məlumatları'][label] = val;
        else if(key.includes('[3.Ata]') || key.includes('[1.Əlaqə]')) groups['Ata / Qəyyum Məlumatları'][label] = val;
        else if(key.includes('[3.Ana]')) groups['Ana Məlumatları'][label] = val;
        else groups['Digər / Əlavə'][label] = val;
      }

      for(let g in groups) {
        if(Object.keys(groups[g]).length === 0) continue;
        
        const gridHtml = Object.keys(groups[g]).map(k => `
          <div class="data-item">
            <span class="data-label">${k}</span>
            <span class="data-value">${groups[g][k]}</span>
          </div>
        `).join('');

        content.innerHTML += `
          <div class="data-group">
            <h4>${g}</h4>
            <div class="data-grid">
              ${gridHtml}
            </div>
          </div>
        `;
      }

      document.getElementById('detail-modal').classList.add('active');
    }

    window.closeModal = function() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    window.deleteItem = async function(index) {
      if(confirm('Seçilmiş müraciəti API və verilənlər bazasından birdəfəlik silmək istədiyinizə əminsiniz?')) {
        const item = rawData[index];

        // Məlumat Supabase-dən gəlibsə və ID-si varsa API-yə delete atırıq
        if(item._db_id_) {
            try {
                await fetch('https://miwvdhwrmxoetszkxlzy.supabase.co/rest/v1/registrations?id=eq.' + item._db_id_, {
                    method: 'DELETE',
                    headers: {
                        'apikey': 'sb_publishable_2ze6sA6QRtBJos9jGIuKpA_08oDul8x',
                        'Authorization': 'Bearer sb_publishable_2ze6sA6QRtBJos9jGIuKpA_08oDul8x'
                    }
                });
            } catch(e) { console.error("Supabase silinmə xətası:", e); }
        }

        rawData.splice(index, 1);
        localStorage.setItem('evrika_crm_data', JSON.stringify(rawData)); // Localı da təmizlə
        renderDashboard();
      }
    }

    // Initialize
    loadData();
  </script>
  <script>
    function toggleLang(btn) {
      const code = document.getElementById('lang-code');
      if (code.textContent === 'AZ') {
        code.textContent = 'EN';
        btn.title = 'Switch to Azerbaijani';
      } else {
        code.textContent = 'AZ';
        btn.title = 'Switch to English';
      }
    }
  </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof updateContent === 'function') {
                updateContent(localStorage.getItem('evrika-lang') || 'az');
            }
        });
    </script>

    


    


    


    
    



    

</body>
