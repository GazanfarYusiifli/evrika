<!DOCTYPE html>
<html lang="az">
<head>
  <meta name="format-detection" content="telephone=no">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evrika | Ödəniş Portalı</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
      margin: 0; font-family: 'Inter', sans-serif; color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .mesh-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(circle at 0% 0%, rgba(225, 29, 72, 0.15), transparent 40%),
                  radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.15), transparent 40%);
    }
    .pay-card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 450px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6);
      position: relative;
      z-index: 10;
    }
    .pay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .pay-amount-box { text-align: center; margin-bottom: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
    .pay-amount-box p { margin: 0 0 10px 0; color: rgba(255,255,255,0.6); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .pay-amount-box h2 { margin: 0; font-size: 2.5rem; font-weight: 800; color: #fff; }
    
    .pay-input-group { margin-bottom: 20px; }
    .pay-input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: rgba(255, 255, 255, 0.5); margin-bottom: 8px; }
    .pay-input { width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; font-family: inherit; font-size: 1rem; color: white; transition: all 0.3s; box-sizing: border-box; }
    .pay-input:focus { outline: none; border-color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.5); }
    .pay-input::placeholder { color: rgba(255,255,255,0.2); }
    
    .pay-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
    .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
    .pay-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>

  <link rel="stylesheet" crossorigin href="/src/style.css">
</head>
<body>

<div class="mesh-bg"></div>

<div class="pay-card">
  <div class="pay-header">
    <h4 style="font-weight: 900; font-size: 1.2rem; margin:0; color:#fff;">PAYRIFF SECURE</h4>
    <div style="display: flex; gap: 10px;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" style="height: 22px;" alt="Mastercard">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" style="height: 16px;" alt="Visa">
    </div>
  </div>  <div class="pay-amount-box">
    <p>İmtahan Kuponu</p>
    <h2 id="payment-amount-display">20.00 AZN</h2>
    <div id="student-name" style="margin-top: 10px; font-size: 0.85rem; color: #94a3b8; font-weight: 600;"></div>
  </div>

  <div class="pay-input-group">
    <label>Kart Sahibinin Adı</label>
    <input type="text" class="pay-input" id="pay_cardName" placeholder="Məs: HƏSƏN HƏSƏNOV">
  </div>

  <div class="pay-input-group">
    <label>Kart Nömrəsi</label>
    <input type="text" class="pay-input" id="pay_cardNum" maxlength="19" placeholder="4422 0026 1998 2026">
  </div>
  
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="pay-input-group">
      <label>Tarix</label>
      <input type="text" class="pay-input" placeholder="12/28" maxlength="5">
    </div>
    <div class="pay-input-group">
      <label>CVV</label>
      <input type="password" class="pay-input" maxlength="3" placeholder="***">
    </div>
  </div>

  <button type="button" class="pay-btn" id="paySubmitBtn" onclick="processPayment()">ÖDƏNİŞİ TƏSDİQLƏ</button>
  <p style="text-align:center; font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 25px;"><i class="fas fa-lock"></i> AES-256 Şifrələnmə ilə qorunur</p>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const regId = urlParams.get('id');
  const regName = urlParams.get('name');
  const amountParam = urlParams.get('amount') || '20';
  const emailParam = urlParams.get('email') || '';
  
  document.getElementById('payment-amount-display').innerText = amountParam + '.00 AZN';
  
  if (regName) {
    document.getElementById('student-name').innerText = "Şagird: " + regName;
  }

  // Auto format card number
  document.getElementById('pay_cardNum').addEventListener('input', function (e) {
    let value = e.target.value.replace(/\D/g, '');
    let formatted = '';
    for(let i=0; i<value.length; i++) {
        if(i > 0 && i % 4 === 0) { formatted += ' '; }
        formatted += value[i];
    }
    e.target.value = formatted;
  });

  async function processPayment() {
    if (!regId) {
      alert("Xəta: Qeydiyyat ID tapılmadı.");
      return;
    }

    const cardName = document.getElementById('pay_cardName').value.trim();
    const cardNum = document.getElementById('pay_cardNum').value.replace(/\s+/g, '').trim();
    
    if(!cardName || cardNum.length < 16) {
        alert("Zəhmət olmasa kart məlumatlarını doğru daxil edin.");
        return;
    }
    
    const last4 = cardNum.slice(-4);
    
    const btn = document.getElementById('paySubmitBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TƏSDİQLƏNİR...';
    btn.disabled = true;

    try {
        // Fetch existing record to get payload
        const getRes = await fetch('https://miwvdhwrmxoetszkxlzy.supabase.co/rest/v1/registrations?id=eq.' + regId, {
            headers: {
                'apikey': 'sb_publishable_jH_DXzdK6KxixdfZqvra-w_oZbU8EzV',
                'Authorization': 'Bearer sb_publishable_jH_DXzdK6KxixdfZqvra-w_oZbU8EzV'
            }
        });
        const records = await getRes.json();
        
        if (records && records.length > 0) {
            const currentPayload = records[0].payload;
            currentPayload.note += ' | Ödəniş: ' + cardName.toUpperCase() + ' tərəfindən **** **** **** ' + last4 + ' kartı ilə ' + amountParam + ' AZN ödənildi.';
            currentPayload.status = "Ödənilib";

            // Update record
            await fetch('https://miwvdhwrmxoetszkxlzy.supabase.co/rest/v1/registrations?id=eq.' + regId, {
              method: 'PATCH',
              headers: {
                'apikey': 'sb_publishable_jH_DXzdK6KxixdfZqvra-w_oZbU8EzV',
                'Authorization': 'Bearer sb_publishable_jH_DXzdK6KxixdfZqvra-w_oZbU8EzV',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ payload: currentPayload })
            });
            
            // Trigger API to send email
            if (emailParam) {
                try {
                    await fetch('/api/send-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: emailParam,
                            name: regName || 'Namizəd',
                            dbId: regId
                        })
                    });
                } catch(err) { console.error("Failed to send email API:", err); }
            }
        }
    } catch(e) { console.error('Update failed:', e); }

    setTimeout(() => {
      const payCard = document.querySelector('.pay-card');
      payCard.innerHTML = `
          <div style="text-align:center;">
              <div style="width:80px; height:80px; background:rgba(16,185,129,0.1); color:#10B981; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 20px;">
                  <i class="fas fa-check"></i>
              </div>
              <h3 style="font-weight: 900; font-size: 1.6rem; margin-bottom: 10px; color: #fff;">Ödəniş Uğurlu!</h3>
              <p style="color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-bottom: 30px; line-height:1.6;">
                  İmtahana giriş kuponunuz və QR kod <b>${emailParam}</b> ünvanına uğurla göndərildi.
              </p>

              <button onclick="window.location.href='index.html'" style="width:100%; padding:18px; border:none; border-radius:12px; background:rgba(255,255,255,0.1); color:white; font-weight:800; font-size:1rem; cursor:pointer; transition:0.3s;">
                  Ana Səhifəyə Qayıt
              </button>
          </div>
      `;
    }, 1500);
  }
</script>

<style>

    right: 0;

    transform: translateY(-50%);

    color: white;
    z-index: 9999;
    border-radius: 12px 0 0 12px;
    padding: 15px 12px;

    flex-direction: column;
    gap: 15px;
    box-shadow: -4px 0 20px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.1);
    border-right: none;
}
.floating-ejurnal-title {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-weight: 800;
    font-size: 0.95rem;
    letter-spacing: 2px;
    margin: 0;
    padding: 10px 0;
    color: #ffffff;
}
.floating-app-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 45px;
    height: 45px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    color: white;
    text-decoration: none;
    font-size: 1.6rem;
    transition: all 0.3s ease;
}
.floating-app-btn:hover {
    background: white;
    color: #8B1A2B;
}
.floating-app-btn .qr-tooltip {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%) translateX(20px);
    background: white;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(0,0,0,0.08);
}
.floating-app-btn .qr-tooltip::after {
    content: '';
    position: absolute;
    right: -8px;
    top: 50%;
    transform: translateY(-50%);
    border-width: 8px 0 8px 8px;
    border-style: solid;
    border-color: transparent transparent transparent white;
}
.floating-app-btn:hover .qr-tooltip {
    opacity: 1;
    visibility: visible;
    transform: translateY(-50%) translateX(0);
}
.floating-app-btn .qr-tooltip img {
    width: 100px;
    height: 100px;
    border-radius: 8px;
    object-fit: cover;
}
.floating-app-btn .qr-tooltip span {
    color: #333;
    font-size: 0.85rem;
    font-weight: 800;
    white-space: nowrap;
}

@media (max-width: 768px) {
    .floating-ejurnal {
        top: auto;
        bottom: 25px;
        right: 50%;
        transform: translateX(50%);
        flex-direction: row;
        border-radius: 50px;
        padding: 8px 15px;
        align-items: center;
        width: auto;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }
    .floating-ejurnal-title {
        writing-mode: horizontal-tb;
        transform: none;
        padding: 0;
        margin-right: 5px;
        font-size: 0.95rem;
    }
    .floating-app-btn {
        width: 40px;
        height: 40px;
        font-size: 1.3rem;
    }
    .floating-app-btn .qr-tooltip {
        display: none !important;
    }
}
</style>
