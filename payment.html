<!DOCTYPE html>
<html lang="az">
<head>
  <meta name="format-detection" content="telephone=no">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evrika | Ödəniş Portalı</title>
    <meta name="description" content="Evrika – gələcəyin liderlərini yetişdirən müasir təhsil ekosistemi.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
      margin: 0; font-family: 'Inter', sans-serif; color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .mesh-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(circle at 0% 0%, rgba(225, 29, 72, 0.15), transparent 40%),
                  radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.15), transparent 40%);
    }
    .pay-card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 450px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6);
      position: relative;
      z-index: 10;
    }
    .pay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .pay-amount-box { text-align: center; margin-bottom: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
    .pay-amount-box p { margin: 0 0 10px 0; color: rgba(255,255,255,0.6); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .pay-amount-box h2 { margin: 0; font-size: 2.5rem; font-weight: 800; color: #fff; }
    
    .pay-input-group { margin-bottom: 20px; }
    .pay-input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: rgba(255, 255, 255, 0.5); margin-bottom: 8px; }
    .pay-input { width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; font-family: inherit; font-size: 1rem; color: white; transition: all 0.3s; box-sizing: border-box; }
    .pay-input:focus { outline: none; border-color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.5); }
    .pay-input::placeholder { color: rgba(255,255,255,0.2); }
    
    .pay-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
    .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
    .pay-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>

  <link rel="stylesheet" crossorigin href="/src/style.css">
</head>
<body>

<div class="mesh-bg"></div>

<div class="pay-card">
  <div class="pay-header">
    <h4 style="font-weight: 900; font-size: 1.2rem; margin:0; color:#fff;">EPOINT SECURE</h4>
    <div style="display: flex; gap: 10px;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" style="height: 22px;" alt="Mastercard">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" style="height: 16px;" alt="Visa">
    </div>
  </div>  <div class="pay-amount-box">
    <p>İmtahan Kuponu</p>
    <h2 id="payment-amount-display">20.00 AZN</h2>
    <div id="student-name" style="margin-top: 10px; font-size: 0.85rem; color: #94a3b8; font-weight: 600;"></div>
  </div>

  <div style="text-align:center; margin-bottom: 20px;">
    <p style="color: rgba(255,255,255,0.7); font-size: 0.95rem;">
      Ödənişiniz tam təhlükəsiz şəkildə Epoint gateway vasitəsilə həyata keçiriləcək. Davam etmək üçün aşağıdakı düyməni sıxın.
    </p>
  </div>

  <button type="button" class="pay-btn" id="paySubmitBtn" onclick="processPayment()">EPOINT İLƏ ÖDƏ</button>
  <p style="text-align:center; font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 25px;"><i class="fas fa-lock"></i> AES-256 Şifrələnmə ilə qorunur</p>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const regId = urlParams.get('id');
  const regName = urlParams.get('name');
  const amountParam = urlParams.get('amount') || '20';
  const emailParam = urlParams.get('email') || '';
  
  document.getElementById('payment-amount-display').innerText = amountParam + '.00 AZN';
  
  if (regName) {
    document.getElementById('student-name').innerText = "Şagird: " + regName;
  }

  async function processPayment() {
    if (!regId) {
      alert("Xəta: Qeydiyyat ID tapılmadı.");
      return;
    }

    const btn = document.getElementById('paySubmitBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> BAĞLANTI QURULUR...';
    btn.disabled = true;

    try {
        const response = await fetch('/api/epoint', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: parseInt(amountParam),
            order_id: regId, 
            description: "Evrika İmtahan / Qeydiyyat",
            regId: regId,
            email: emailParam,
            name: regName
          })
        });

        const data = await response.json();
        
        if (data.redirect_url) {
            btn.innerHTML = 'EPOINT-Ə YÖNLƏNDIRILIR...';
            setTimeout(() => {
               window.location.href = data.redirect_url;
            }, 1000);
        } else {
            alert('Xəta baş verdi: ' + (data.message || data.error || 'Server Xətası') + '

Qeyd: Private key quraşdırılmayıbsa bu xəta normaldır.');
            btn.innerHTML = 'YENİDƏN CƏHD ET';
            btn.disabled = false;
        }

    } catch(e) { 
        console.error('Fetch failed:', e);
        alert('Serverlə əlaqə qurulmadı. Zəhmət olmasa Vercel-ə deploy etdiyinizə əmin olun!');
        btn.innerHTML = 'EPOINT İLƏ ÖDƏ';
        btn.disabled = false;
    }
  }
</script>

    

</body>
</html>
