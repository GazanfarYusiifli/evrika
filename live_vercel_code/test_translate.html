<!DOCTYPE html>
<html>
<head>
  <title>Test Translate</title>
    <meta name="description" content="Evrika – gələcəyin liderlərini yetişdirən müasir təhsil ekosistemi.">
</head>
<body>
  <div id="google_translate_element" style="display:none;"></div>
  <h1>Salam Dünya</h1>
  <p>Bu bir sınaqdır.</p>
  <button onclick="changeLanguage('en')">EN</button>
  <button onclick="changeLanguage('ru')">RU</button>
  <button onclick="changeLanguage('az')">AZ</button>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'az', includedLanguages: 'az,en,ru', autoDisplay: false}, 'google_translate_element');
    }
    
    function changeLanguage(lang) {
      var select = document.querySelector('.goog-te-combo');
      if (select) {
        select.value = lang;
        select.dispatchEvent(new Event('change'));
      }
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
